<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Emoji — 2 игрока</title>

<style>
:root{
    --orange:#ff8c00;
    --orange-light:#ffd6a0;
    --text:#333333;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:30px;
    color:var(--text);

    background:
        linear-gradient(
            135deg,
            #fffaf5 0%,
            #fff7ef 40%,
            #fff3e4 100%
        );
}

.container{
    text-align:center;
    max-width:900px;
}

h1{
    color:var(--orange);
    margin-bottom:20px;
}

.info{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.player-box{
    background:#fff;
    border:2px solid var(--orange-light);
    border-radius:12px;
    padding:12px 20px;
    min-width:150px;
    font-weight:bold;
    transition:.25s;
}

.player-box.active{
    border-color:var(--orange);
    box-shadow:0 0 15px rgba(255,140,0,.25);
}

.turn{
    margin:15px 0;
    font-size:18px;
    font-weight:bold;
    color:var(--orange);
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:25px;
}

button{
    background:var(--orange);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:12px 20px;
    cursor:pointer;
    font-size:16px;
    transition:.2s;
}

button:hover{
    background:#e57d00;
}

.board{
    display:grid;
    grid-template-columns:repeat(6,80px);
    gap:10px;
    justify-content:center;
}

.card{
    width:80px;
    height:80px;

    background:#fff;
    border:2px solid var(--orange-light);
    border-radius:16px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;
    cursor:pointer;
    user-select:none;

    box-shadow:0 4px 8px rgba(0,0,0,.08);

    transition:.2s;
}

.card:hover:not(.open):not(.matched){
    transform:scale(1.05);
}

.card.open,
.card.matched{
    background:#fff0db;
    border-color:var(--orange);
    transform:scale(1.03);
}

.card.matched{
    cursor:default;
}

@media (max-width:700px){

    .board{
        grid-template-columns:repeat(6,55px);
        gap:6px;
    }

    .card{
        width:55px;
        height:55px;
        font-size:24px;
    }
}
</style>

</head>
<body>

<div class="container">

```
<h1>🧠 Memory Emoji</h1>

<div class="info">
    <div class="player-box active" id="player1Box">
        Игрок 1: <span id="score1">0</span>
    </div>

    <div class="player-box" id="player2Box">
        Игрок 2: <span id="score2">0</span>
    </div>
</div>

<div class="turn" id="turnText">
    Ход: Игрок 1
</div>

<div class="controls">
    <button onclick="startGame()">🔄 Новая игра</button>
    <button id="musicBtn">🎵 Включить музыку</button>
</div>

<div class="board" id="board"></div>
```

</div>

<script>

/* 12 ПАР = 24 КАРТОЧКИ */

const emojis = [
    "😀","😀",
    "😍","😍",
    "🤖","🤖",
    "🐱","🐱",
    "🐶","🐶",
    "🍕","🍕",
    "🚀","🚀",
    "🌟","🌟",
    "🎈","🎈",
    "🍓","🍓",
    "🦊","🦊",
    "🍀","🍀"
];

let firstCard = null;
let secondCard = null;
let lockBoard = false;

let currentPlayer = 1;
let scores = [0,0];

const board = document.getElementById("board");

function shuffle(array){
    const arr = [...array];

    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }

    return arr;
}

function updateUI(){

    score1.textContent = scores[0];
    score2.textContent = scores[1];

    turnText.textContent =
        `Ход: Игрок ${currentPlayer}`;

    player1Box.classList.toggle(
        "active",
        currentPlayer === 1
    );

    player2Box.classList.toggle(
        "active",
        currentPlayer === 2
    );
}

function switchPlayer(){
    currentPlayer =
        currentPlayer === 1 ? 2 : 1;

    updateUI();
}

function createCard(emoji){

    const card =
        document.createElement("div");

    card.className = "card";
    card.dataset.emoji = emoji;
    card.textContent = "?";

    card.addEventListener(
        "click",
        () => flipCard(card)
    );

    return card;
}

function flipCard(card){

    if(
        lockBoard ||
        card.classList.contains("open") ||
        card.classList.contains("matched")
    ){
        return;
    }

    card.classList.add("open");
    card.textContent = card.dataset.emoji;

    if(!firstCard){
        firstCard = card;
        return;
    }

    secondCard = card;
    lockBoard = true;

    checkMatch();
}

function checkMatch(){

    const matched =
        firstCard.dataset.emoji ===
        secondCard.dataset.emoji;

    if(matched){

        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        scores[currentPlayer - 1]++;

        resetTurn();
        updateUI();

        checkWinner();

    }else{

        setTimeout(() => {

            firstCard.classList.remove("open");
            secondCard.classList.remove("open");

            firstCard.textContent = "?";
            secondCard.textContent = "?";

            resetTurn();

            switchPlayer();

        },1000);
    }
}

function resetTurn(){

    firstCard = null;
    secondCard = null;
    lockBoard = false;
}

function checkWinner(){

    const matchedCards =
        document.querySelectorAll(".matched").length;

    if(matchedCards === emojis.length){

        let result;

        if(scores[0] > scores[1]){
            result = "🏆 Победил Игрок 1!";
        }
        else if(scores[1] > scores[0]){
            result = "🏆 Победил Игрок 2!";
        }
        else{
            result = "🤝 Ничья!";
        }

        setTimeout(() => {

            const restart = confirm(
`${result}

Игрок 1: ${scores[0]}
Игрок 2: ${scores[1]}

Начать новую игру?`
            );

            if(restart){
                startGame();
            }

        },400);
    }
}

function startGame(){

    board.innerHTML = "";

    firstCard = null;
    secondCard = null;
    lockBoard = false;

    currentPlayer = 1;
    scores = [0,0];

    updateUI();

    shuffle(emojis).forEach(emoji => {
        board.appendChild(
            createCard(emoji)
        );
    });
}

/* СПОКОЙНАЯ ГЕНЕРАТИВНАЯ МУЗЫКА */

let audioStarted = false;
let audioCtx;

const notes = [
    261.63,
    293.66,
    329.63,
    349.23,
    392.00,
    440.00,
    493.88,
    523.25
];

function playTone(freq,duration=3){

    const osc =
        audioCtx.createOscillator();

    const gain =
        audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(
        0,
        audioCtx.currentTime
    );

    gain.gain.linearRampToValueAtTime(
        0.025,
        audioCtx.currentTime + 0.8
    );

    gain.gain.linearRampToValueAtTime(
        0,
        audioCtx.currentTime + duration
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function startAmbientMusic(){

    if(audioStarted) return;

    audioStarted = true;

    audioCtx =
        new (
            window.AudioContext ||
            window.webkitAudioContext
        )();

    setInterval(() => {

        const note =
            notes[
                Math.floor(
                    Math.random() *
                    notes.length
                )
            ];

        playTone(
            note,
            2 + Math.random() * 3
        );

    },1100);

    setInterval(() => {

        const bass =
            notes[
                Math.floor(
                    Math.random() *
                    notes.length
                )
            ] / 2;

        playTone(
            bass,
            4 + Math.random() * 4
        );

    },3000);
}

musicBtn.addEventListener(
    "click",
    () => {

        startAmbientMusic();

        musicBtn.textContent =
            "🎵 Музыка играет";
    }
);

startGame();

</script>

</body>
</html>
